name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scala-version: ['2.13']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Mill dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/mill
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-mill-${{ hashFiles('build.sc') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Compile
        run: ./mill --disable-ticker __.compile

      - name: Test
        run: ./mill --disable-ticker __.test
